<!DOCTYPE html>
<html lang="en" style="overflow:hidden;">
<head>
  <meta charset="UTF-8">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <title>ginjae main</title>
  <style>
    #graph {
      width: 100vw;
      min-width: 300px;
      height: 100vh;
      box-sizing: border-box;
      border: 1.5px solid #515151;
      border-radius: 10px;
      overflow: hidden;
    }
  </style>
</head>
<body style="background-color:#212121;touch-action:none;margin:0;">
  <div id="graph"></div>
  
  <script>
    const ns = [
      { id: "   ginjae   ", url: "https://ginjae.github.io", group: 0},
      { id: "GitHub", url: "https://github.com/ginjae", group: 1},
      { id: "Solved.ac", url: "https://solved.ac/profile/jamk", group: 1},
      { id: "Baekjoon", url: "https://www.acmicpc.net/user/jamk", group: 1},
      { id: "SpringBoot", url: "http://springboot-blog-env.eba-amscp3sq.ap-northeast-2.elasticbeanstalk.com/articles", group: 2},
      { id: "InfoVis", url: "https://ginjae.github.io/gyeongju", group: 2},
    ];
    const ls = [
      { source: "   ginjae   ", target: "GitHub", value: 40},
      { source: "   ginjae   ", target: "Solved.ac", value: 40},
      { source: "   ginjae   ", target: "Baekjoon", value: 40},
      { source: "InfoVis", target: "GitHub", value: 40},
      { source: "SpringBoot", target: "GitHub", value: 40},
    ]
    const data = {
      nodes : ns,
      links : ls
    }

    // Specify the dimensions of the chart.
    var graph = document.getElementById('graph');
    width = graph.clientWidth;
    height = graph.clientHeight;

    // Specify the color scale.
    const color = d3.scaleOrdinal(["#4e79a7","#f28e2c","#e15759","#76b7b2","#59a14f","#edc949","#af7aa1","#ff9da7","#9c755f","#bab0ab"]);

    // The force simulation mutates links and nodes, so create a copy
    // so that re-evaluating this cell produces the same result.
    const links = data.links.map(d => ({...d}));
    const nodes = data.nodes.map(d => ({...d}));
    nodes.forEach(node => {
      if (node.id == "   ginjae   ") {
        node.x = width / 2;
        node.y = height / 2;
      } else {
        node.x = Math.random() * width;
        node.y = Math.random() * height;
      }
    })

    // Create a simulation with several forces.
    function customForceCenter(targetNodes, x, y) {
      return function(alpha) {
        for (const node of targetNodes) {
          node.vx += (x - node.x) * alpha;
          node.vy += (y - node.y) * alpha;
        }
      };
    }

    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).strength(0.3).distance(100))
        .force("charge", d3.forceManyBody().strength(-1500))
        .force("center", customForceCenter(nodes.filter(node => node.id === "   ginjae   "), width / 2, height / 2))
        .on("tick", ticked);

    // Create the SVG container.
    const svg = d3.select("#graph")
        .append("svg")
        .attr("width", "100%")
        .attr("height", "100%")
        .attr("viewBox", [0, 0, width, height])
        .style("user-select", "none");

    function resizeSVG() {
      width = graph.clientWidth;
      height = graph.clientHeight;
      svg.attr("width", "100%")
          .attr("height", "100%")
          .attr("viewBox", [0, 0, width, height]);
      simulation.force("center", customForceCenter(nodes.filter(node => node.id === "   ginjae   "), width / 2, height / 2))
      simulation.alpha(1).restart();
    }
    window.addEventListener("resize", resizeSVG);

    // Add a line for each link, and a circle for each node.
    const link = svg.append("g")
        .attr("stroke", "white")
        .attr("stroke-opacity", 0.3)
        .selectAll()
        .data(links)
        .join("line")
        .style("opacity", 0)
        .attr("stroke-width", d => Math.sqrt(d.value))
        .attr("stroke-linecap", "round");

    const node = svg.selectAll(".node")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .style("opacity", 0)
        .attr("transform", d => `translate(${d.x}, ${d.y})`)
        .call(d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged)
          .on("end", dragended));

    link.transition()
        .duration(1000)
        .ease(d3.easeCubicInOut)
        .style("opacity", 1);

    node.transition()
        .duration(500)
        .ease(d3.easeCubicInOut)
        .style("opacity", 1);

    const circle = node.append("circle")
        .attr("r", d => d.id.length * 7)
        .attr("fill", d => color(d.group))
        .attr("stroke", "white")
        .on("click", function(d) {
          if (d.srcElement.__data__.id !== "   ginjae   ")
            window.open(d.srcElement.__data__.url);
        })
        .on("mouseover", function(d) {
          if (d.srcElement.__data__.id !== "   ginjae   ") {
            var color = d3.color(d3.select(this).attr("fill"));
            color = color.brighter(-3);
            d3.select(this).attr("fill", color);
          }
        })
        .on("mouseout", function(d) {
          if (d.srcElement.__data__.id !== "   ginjae   ") {
            d3.select(this).attr("fill", d => color(d.group));
          }
        });

    const text = node.append("text")
        .text(d => d.id)
        .attr("fill", "white")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("pointer-events", "none")
        .attr("font-family", "sans-serif")
        .attr("font-weight", "bold")
        .attr("font-size", d => {
          if (d.id === "   ginjae   ")
            return "50px";
          else
            return "20px";
        });

    // Set the position attributes of links and nodes each time the simulation ticks.
    function ticked() {
      node
          .attr("transform", d => {
            d.x = Math.max(15, Math.min(width - 15, d.x));
            d.y = Math.max(15, Math.min(height - 15, d.y));
            return `translate(${d.x},${d.y})`;
          });

      link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);
    }

    // Reheat the simulation when drag starts, and fix the subject position.
    function dragstarted(event) {
      if (!event.active) simulation.alphaTarget(0.5).restart();
      event.subject.fx = event.subject.x;
      event.subject.fy = event.subject.y;
    }

    // Update the subject (dragged node) position during drag.
    function dragged(event) {
      event.subject.fx = event.x;
      event.subject.fy = event.y;
    }

    // Restore the target alpha so the simulation cools after dragging ends.
    // Unfix the subject position now that it’s no longer being dragged.
    function dragended(event) {
      if (!event.active) simulation.alphaTarget(0);
      event.subject.fx = null;
      event.subject.fy = null;
    }

  </script>
</body>
</html>
