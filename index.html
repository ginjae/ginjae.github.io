<!DOCTYPE html>
<html lang="en" style="overflow:hidden;">
<head>
  <meta charset="UTF-8">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <title>ginjae main</title>
</head>
<body style="background-color:#212121;touch-action:none;">
  <div id="graph" style="width:100vw;height:100vh;"></div>
  
  <script>
    const ns = [
      { id: "ginjae", url: "https://ginjae.github.io", group: 0, value: 40},
      { id: "Github", url: "https://github.com/ginjae", group: 0, value: 30},
      { id: "InfoVis", url: "https://ginjae.github.io/gyeongju", group: 1, value: 30},
      { id: "Solved.ac", url: "https://solved.ac/profile/jamk", group: 2, value: 35},
    ];
    const ls = [
      { source: "ginjae", target: "Github", value: 40},
      { source: "InfoVis", target: "Github", value: 50},
      { source: "ginjae", target: "InfoVis", value: 40},
      { source: "ginjae", target: "Solved.ac", value: 40},
    ]
    const data = {
      nodes : ns,
      links : ls
    }

    // Specify the dimensions of the chart.
    var graph = document.getElementById('graph');
    const width = graph.clientWidth;
    const height = graph.clientHeight;

    // Specify the color scale.
    const color = d3.scaleOrdinal(d3.schemeCategory10);

    // The force simulation mutates links and nodes, so create a copy
    // so that re-evaluating this cell produces the same result.
    const links = data.links.map(d => ({...d}));
    const nodes = data.nodes.map(d => ({...d}));

    // Create a simulation with several forces.
    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).strength(0.3).distance(150))
        .force("charge", d3.forceManyBody())
        .force("center", d3.forceCenter(width / 2, height / 2))
        .on("tick", ticked);

    // Create the SVG container.
    const svg = d3.select("#graph")
        .append("svg")
        .attr("width", "100%")
        .attr("height", "100%")
        .attr("viewBox", [0, 0, width, height]);

    // Add a line for each link, and a circle for each node.
    const link = svg.append("g")
        .attr("stroke", "white")
        .attr("stroke-opacity", 0.3)
      .selectAll()
      .data(links)
      .join("line")
        .attr("stroke-width", d => Math.sqrt(d.value))
        .attr("stroke-linecap", "round");

    const node = svg.append("g")
      .selectAll(".node")
      .data(nodes);

    const circles = node.join("circle")
        .attr("r", d => d.value)
        .attr("fill", d => color(d.group))
        .attr("stroke", "white")
        .on("click", function(d) {
          window.open(d.srcElement.__data__.url);
        })
        .on("mouseover", function(d) {
          var color = d3.color(d3.select(this).attr("fill"));
          color = color.brighter(-3);
          d3.select(this).attr("fill", color)
        })
        .on("mouseout", function(d) {
          d3.select(this).attr("fill", d => color(d.group));
        });
        // .append("text")
        // .text(d => d.id)
        // .attr("fill", d => color(d.group))
        // .attr("font-weight", "bold")
        // .style("text-anchor", "middle")
        // .on("click", "none");

    const text = node.join("text")
        .text(d => d.id)
        .attr("fill", "white")
        .attr("text-anchor", "middle")
        .attr("pointer-events", "none");

    // Add a drag behavior.
    circles.call(d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged)
          .on("end", dragended));

    // Set the position attributes of links and nodes each time the simulation ticks.
    function ticked() {
      link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);

      circles
          .attr("cx", d => d.x)
          .attr("cy", d => d.y);

      text
          .attr("dx", d => d.x)
          .attr("dy", d => d.y + 4.5);
    }

    // Reheat the simulation when drag starts, and fix the subject position.
    function dragstarted(event) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      event.subject.fx = event.subject.x;
      event.subject.fy = event.subject.y;
    }

    // Update the subject (dragged node) position during drag.
    function dragged(event) {
      event.subject.fx = event.x;
      event.subject.fy = event.y;
    }

    // Restore the target alpha so the simulation cools after dragging ends.
    // Unfix the subject position now that it’s no longer being dragged.
    function dragended(event) {
      if (!event.active) simulation.alphaTarget(0);
      event.subject.fx = null;
      event.subject.fy = null;
    }

  </script>
</body>
</html>
