<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaemin Kim</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    i {
      position: relative;
      top: -2px;
    }
    .link-secondary {
      text-decoration: none;
    }
    .link-secondary:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header class="text-center shadow py-5">
    <h1 class="fw-bold">JAEMIN KIM</h1>

    <a class="link-secondary icon-link icon-link-hover align-middle" href="https://sites.google.com/view/uailab">
      Ubiquitous AI Lab 
      <i class="bi bi-arrow-right align-middle"></i>
    </a>
    <br>
    <a class="link-secondary icon-link icon-link-hover align-middle" href="https://cse.unist.ac.kr">
      Department of Computer Science and Engineering
      <i class="bi bi-arrow-right align-middle"></i>
    </a>
    <br>
    <a class="link-secondary icon-link icon-link-hover align-middle" href="https://www.unist.ac.kr">
      UNIST
      <i class="bi bi-arrow-right align-middle"></i>
    </a>
    <br>
    <button type="button" class="btn btn-link link-secondary icon-link icon-link-hover" style="--bs-icon-link-transform: translate3d(0, -.125rem, 0);" onclick="copyEmail()" id="copyButton">
      E-mail: jm611@unist.ac.kr
      <i class="bi bi-clipboard" id="copyIcon"></i>
    </button>
  </header>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function copyEmail() {
      const email = 'jm611@unist.ac.kr';
      navigator.clipboard.writeText(email).then(() => {
        const icon = document.getElementById('copyIcon');
        icon.classList.remove('bi-clipboard');
        icon.classList.add('bi-check');

        setTimeout(() => {
          icon.classList.remove('bi-check');
          icon.classList.add('bi-clipboard');
        }, 2000);
      }).catch((err) => {
        console.error('failed to copy E-mail', err);
      });
    }
  </script>
</body>
</html>
